    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "blue", "id": "C001", "label": "C001 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C002", "label": "C002 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C003", "label": "C003 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C004", "label": "C004 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C005", "label": "C005 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C006", "label": "C006 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C007", "label": "C007 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C008", "label": "C008 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C009", "label": "C009 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C010", "label": "C010 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C011", "label": "C011 (citizen)", "shape": "dot"}, {"color": "blue", "id": "C012", "label": "C012 (citizen)", "shape": "dot"}, {"color": "green", "id": "P001", "label": "P001 (property)", "shape": "dot"}, {"color": "green", "id": "P002", "label": "P002 (property)", "shape": "dot"}, {"color": "green", "id": "P003", "label": "P003 (property)", "shape": "dot"}, {"color": "green", "id": "P004", "label": "P004 (property)", "shape": "dot"}, {"color": "green", "id": "P005", "label": "P005 (property)", "shape": "dot"}, {"color": "green", "id": "P006", "label": "P006 (property)", "shape": "dot"}, {"color": "red", "id": "PM-KISAN", "label": "PM-KISAN (scheme)", "shape": "dot"}, {"color": "red", "id": "PDS", "label": "PDS (scheme)", "shape": "dot"}, {"color": "red", "id": "Scholarship", "label": "Scholarship (scheme)", "shape": "dot"}, {"color": "red", "id": "PMAY", "label": "PMAY (scheme)", "shape": "dot"}, {"color": "red", "id": "Startup India", "label": "Startup India (scheme)", "shape": "dot"}, {"color": "red", "id": "MGNREGA", "label": "MGNREGA (scheme)", "shape": "dot"}]);
                  edges = new vis.DataSet([{"from": "C001", "title": "family", "to": "C002"}, {"from": "C001", "title": "family", "to": "C003"}, {"from": "C001", "title": "owns", "to": "P001"}, {"from": "C001", "title": "beneficiary", "to": "PM-KISAN"}, {"from": "C002", "title": "family", "to": "C003"}, {"from": "C002", "title": "beneficiary", "to": "PDS"}, {"from": "C003", "title": "owns", "to": "P002"}, {"from": "C003", "title": "beneficiary", "to": "Scholarship"}, {"from": "C004", "title": "family", "to": "C005"}, {"from": "C004", "title": "family", "to": "C006"}, {"from": "C004", "title": "owns", "to": "P003"}, {"from": "C004", "title": "beneficiary", "to": "PMAY"}, {"from": "C005", "title": "family", "to": "C006"}, {"from": "C005", "title": "beneficiary", "to": "PDS"}, {"from": "C006", "title": "owns", "to": "P004"}, {"from": "C006", "title": "beneficiary", "to": "Startup India"}, {"from": "C007", "title": "family", "to": "C008"}, {"from": "C007", "title": "family", "to": "C009"}, {"from": "C007", "title": "family", "to": "C010"}, {"from": "C007", "title": "owns", "to": "P005"}, {"from": "C007", "title": "beneficiary", "to": "PM-KISAN"}, {"from": "C008", "title": "family", "to": "C009"}, {"from": "C008", "title": "family", "to": "C010"}, {"from": "C008", "title": "beneficiary", "to": "PDS"}, {"from": "C009", "title": "family", "to": "C010"}, {"from": "C009", "title": "beneficiary", "to": "MGNREGA"}, {"from": "C010", "title": "beneficiary", "to": "Scholarship"}, {"from": "C011", "title": "family", "to": "C012"}, {"from": "C011", "title": "owns", "to": "P006"}, {"from": "C011", "title": "beneficiary", "to": "PMAY"}, {"from": "C012", "title": "beneficiary", "to": "PDS"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
